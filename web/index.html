<!doctype html>
<html>
  <head>
    <base href="/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="THE EYE PROTOCOL — Year 2084. Big Brother is watching. Navigate the grid with forbidden hand gestures."
    />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="THE EYE PROTOCOL" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>THE EYE PROTOCOL — Hand-Tracking Spell Combat</title>
    <link rel="manifest" href="manifest.json" />

    <style>
      /* Hidden video element — MediaPipe reads it, user sees the canvas preview instead */
      #mp-video {
        position: fixed;
        top: 0;
        left: 0;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
        z-index: -1;
      }

      /* Live camera preview — surveillance / Big Brother themed */
      #mp-preview-canvas {
        position: fixed;
        bottom: 42px;
        right: 16px;
        width: 200px;
        height: 150px;
        border: 2px solid rgba(0, 200, 60, 0.6);
        border-radius: 2px;
        z-index: 9999;
        pointer-events: none;
        box-shadow:
          0 0 18px rgba(0, 180, 40, 0.35),
          inset 0 0 10px rgba(0, 0, 0, 0.6);
        background: #030805;
        opacity: 0.88;
      }

      /* "BIG BROTHER IS WATCHING" label under the feed */
      #bb-label {
        position: fixed;
        bottom: 16px;
        right: 16px;
        width: 200px;
        text-align: center;
        font-family: monospace;
        font-size: 9px;
        letter-spacing: 2px;
        color: rgba(0, 200, 60, 0.75);
        z-index: 9999;
        pointer-events: none;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <!-- Hidden video element for MediaPipe webcam capture -->
    <video id="mp-video" autoplay playsinline muted></video>

    <!-- Live camera preview with landmarks overlay -->
    <canvas id="mp-preview-canvas"></canvas>

    <!-- Big Brother surveillance label under the feed -->
    <div id="bb-label">BIG BROTHER IS WATCHING</div>

    <!-- MediaPipe Vision bridge (hand + face tracking) -->
    <script type="module" src="mediapipe_bridge.js"></script>

    <!-- Flutter bootstrap -->
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
